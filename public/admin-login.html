<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Đăng Nhập Quản Trị - BHXH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 420px;
      padding: clamp(20px, 6vw, 40px);
    }

    .logo-strip {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-strip img {
      max-width: 80%;
      height: auto;
      max-height: 60px;
    }

    h1 {
      margin: 0 0 6px;
      text-align: center;
      color: #0f8ed8;
      font-size: clamp(18px, 5vw, 22px);
    }

    .sub {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin: 0 0 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: 700;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #d0d7e0;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: #fafbfc;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #0f8ed8;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(15,142,216,0.12);
    }

    .btn-login {
      display: block;
      width: 100%;
      padding: 13px;
      background: #0f8ed8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s;
    }

    .btn-login:hover { background: #0b70ab; }
    .btn-login:active { background: #095c8f; }

    .error-msg {
      color: #d32f2f;
      background: #fff3f3;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 14px;
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #0f8ed8;
      font-size: 13px;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-strip">
    <img src="https://kekhaibaohiem.cc/assets/images/logo_text.svg" alt="BHXH Logo" onerror="this.style.display='none'">
  </div>
  <h1>Đăng Nhập Quản Trị</h1>
  <p class="sub">Dành riêng cho ban quản lý hệ thống</p>

  <div class="error-msg" id="error-msg"></div>

  <form id="admin-login-form" autocomplete="off">
    <div class="form-group">
      <label for="username">Tài khoản</label>
      <input type="text" id="username" name="username" placeholder="Nhập tên tài khoản" required autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">Mật khẩu</label>
      <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login">Đăng Nhập</button>
  </form>
</div>

<script>
document.getElementById('admin-login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const err = document.getElementById('error-msg');
  err.style.display = 'none';

  fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: u, password: p })
  })
  .then(res => res.json().then(data => ({ status: res.status, body: data })))
  .then(res => {
    if (res.status === 200) {
      window.location.href = '/admin';
    } else {
      err.style.display = 'block';
      err.innerText = res.body.error || 'Đăng nhập thất bại';
    }
  })
  .catch(() => {
    err.style.display = 'block';
    err.innerText = 'Lỗi kết nối. Vui lòng thử lại.';
  });
});
</script>

</body>
</html>
