<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Tờ khai đăng ký giao dịch điện tử</title>
  <link rel="stylesheet" href="/register-flow.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner wide">
      <a class="logo-link" href="/" aria-label="Giao dịch điện tử Bảo hiểm xã hội Việt Nam">
        <img class="logo-full" src="/logo_text.svg" alt="">
      </a>
      <nav class="header-actions" aria-label="Tài khoản">
        <a href="/">Đăng nhập</a>
        <a href="/chon-dang-ky">Đăng ký</a>
      </nav>
    </div>
  </header>

  <nav class="icon-toolbar" aria-hidden="true">
    <div class="toolbar-inner wide">
      <a class="toolbar-item" href="/" aria-label="Trang chủ">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="36" height="36" fill="#0b2a55"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </a>
      <span class="toolbar-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="36" height="36" fill="#0b2a55"><path d="M12 1c-5 0-9 4-9 9v3c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h2v-3H4v-4c0-4.42 3.58-8 8-8s8 3.58 8 8v4h-1v3h2c1.1 0 2-.9 2-2v-2c0-1.1-.9-2-2-2v-3c0-5-4-9-9-9z"/><circle cx="12" cy="11" r="3"/><path d="M17 18.5A5.5 5.5 0 0 0 12 15a5.5 5.5 0 0 0-5 3.5 1 1 0 0 0 1 1h8a1 1 0 0 0 1-1z"/></svg>
      </span>
      <span class="toolbar-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="36" height="36" fill="#0b2a55"><path d="M12 1c-5 0-9 4-9 9v3c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h2v-3H4v-4c0-4.42 3.58-8 8-8s8 3.58 8 8v4h-1v3h2c1.1 0 2-.9 2-2v-2c0-1.1-.9-2-2-2v-3c0-5-4-9-9-9z"/><circle cx="12" cy="11" r="3"/><path d="M17 18.5A5.5 5.5 0 0 0 12 15a5.5 5.5 0 0 0-5 3.5 1 1 0 0 0 1 1h8a1 1 0 0 0 1-1z"/></svg>
      </span>
      <span class="toolbar-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#0b2a55" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/><rect x="12" y="7" width="6" height="7" rx="1"/><path d="M14 9h2M14 11h2"/></svg>
      </span>
      <span class="toolbar-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#0b2a55" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zM4 7h2M4 12h2M4 17h2"/><rect x="10" y="8" width="8" height="8" rx="1"/><path d="M13 10l3 2-3 2z" fill="#0b2a55"/></svg>
      </span>
    </div>
  </nav>

  <main class="page">
    <p class="breadcrumb">Trang chủ &nbsp;&gt;&nbsp; <span>Đăng ký</span></p>
    <div class="title-strip">Đăng ký</div>

    <div class="step-row">
      <div class="step disabled">
        <span class="step-dot">1</span>
        <span>Loại đối tượng</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <span class="step-dot">2</span>
        <span>Đăng ký</span>
      </div>
    </div>

    <section class="declaration-card">
      <h1>Tờ khai đăng ký giao dịch điện tử</h1>
      <form id="registerForm">
        <section class="form-section">
          <h2>Thông tin đăng ký</h2>
          <div class="form-grid">
            <label class="field">Họ tên <span class="req">*</span>
              <input name="fullName" placeholder="Nhập họ và tên đầy đủ" required>
            </label>
            <label class="field">Mã số bảo hiểm xã hội <span class="req">*</span>
              <input name="insuranceCode" placeholder="Nhập mã số BHXH" required>
            </label>
            <label class="field">Loại giấy tờ <span class="req">*</span>
              <input name="documentType" placeholder="VD: CCCD, Hộ chiếu..." required>
            </label>


            <label class="field">Số điện thoại <span class="req">*</span>
              <input name="phone" placeholder="Nhập số điện thoại" required>
            </label>
            <label class="field">Email <span class="req">*</span>
              <input name="email" type="email" placeholder="Nhập email" required>
            </label>
          </div>
          <div class="form-grid" style="margin-top: 28px;">
            <label class="field">Tỉnh/Thành phố <span class="req">*</span>
              <input name="province" placeholder="Nhập tỉnh/thành phố" required>
            </label>
          </div>
        </section>
        <input name="password" type="hidden">
        <p id="message" class="message" role="status"></p>
        <div class="form-actions">
          <button class="btn" type="submit">Đăng ký</button>
          <button id="resetButton" class="btn gray" type="button">Làm lại</button>
          <button id="sampleButton" class="btn teal" type="button">Điền dữ liệu mẫu</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">
    <span>©2014 – 2015 - Bản quyền thuộc về Bảo hiểm xã hội Việt Nam.</span>
    <small>Khi sử dụng lại thông tin từ website này, xin vui lòng ghi rõ nguồn "Cổng thông tin điện tử BHXH Việt Nam"</small>
  </footer>

  <script>
    const form = document.getElementById('registerForm');
    const message = document.getElementById('message');
    const resetButton = document.getElementById('resetButton');
    const sampleButton = document.getElementById('sampleButton');

    function setMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type || ''}`.trim();
    }

    function requestJson(url, body) {
      return fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'same-origin',
        body: JSON.stringify(body)
      }).then(function (response) {
        return response.json().catch(function () { return {}; }).then(function (data) {
          if (!response.ok) throw new Error(data.error || 'Có lỗi xảy ra');
          return data;
        });
      });
    }

    function imagePayload(file) {
      if (!file || !file.name) return Promise.resolve(null);
      if (!file.type || !file.type.startsWith('image/')) {
        return Promise.reject(new Error('Vui lòng chỉ tải lên tệp hình ảnh.'));
      }

      return new Promise(function (resolve, reject) {
        const reader = new FileReader();
        reader.onerror = function () {
          reject(new Error('Không đọc được tệp ảnh.'));
        };
        reader.onload = function () {
          const image = new Image();
          image.onerror = function () {
            reject(new Error('Không xử lý được tệp ảnh.'));
          };
          image.onload = function () {
            const maxSide = 1280;
            const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
            const canvas = document.createElement('canvas');
            canvas.width = Math.max(1, Math.round(image.width * scale));
            canvas.height = Math.max(1, Math.round(image.height * scale));
            const context = canvas.getContext('2d');
            context.drawImage(image, 0, 0, canvas.width, canvas.height);
            resolve({
              name: file.name,
              type: 'image/jpeg',
              size: file.size,
              dataUrl: canvas.toDataURL('image/jpeg', 0.78)
            });
          };
          image.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function payloadFromForm() {
      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());
      payload.accountType = sessionStorage.getItem('accountType') || 'caNhan';
      payload.citizenId = payload.insuranceCode;
      payload.password = payload.phone || '123456';
      return Promise.resolve(payload);
    }

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      setMessage('Đang gửi thông tin đăng ký...');
      payloadFromForm().then(function (payload) {
        return requestJson('/api/register', payload);
      }).then(function () {
        setMessage('Đăng ký thành công. Bạn có thể đăng nhập bằng Mã số BHXH và Số điện thoại.', 'success');
      }).catch(function (error) {
        setMessage(error.message, 'error');
      });
    });

    resetButton.addEventListener('click', function () {
      form.reset();
      setMessage('');
    });

    sampleButton.addEventListener('click', function () {
      const stamp = Date.now().toString().slice(-6);
      form.fullName.value = 'Nguyễn Văn A';
      form.insuranceCode.value = 'BH' + stamp;
      form.documentType.value = 'CCCD';

      form.phone.value = '090' + stamp;
      form.email.value = 'dangky' + stamp + '@example.com';
      form.province.value = 'Hà Nội';
    });
  </script>
</body>
</html>
