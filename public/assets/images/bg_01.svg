<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" xmlns:xlink="http://www.w3.org/1999/xlink">
<defs>
  <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#0d2a4e"/>
    <stop offset="100%" stop-color="#040d1a"/>
  </radialGradient>
  <radialGradient id="globeGrad" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#1a6bbf"/>
    <stop offset="50%" stop-color="#0d4a8a"/>
    <stop offset="100%" stop-color="#072040"/>
  </radialGradient>
  <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00bfff" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#00bfff" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
    <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow">
    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
    <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="1200" height="450" fill="url(#bgGrad)"/>

<!-- Stars/dots background -->
<circle cx="80" cy="60" r="1.5" fill="#ffffff" opacity="0.6"/>
<circle cx="200" cy="30" r="1" fill="#ffffff" opacity="0.4"/>
<circle cx="350" cy="80" r="2" fill="#ffffff" opacity="0.5"/>
<circle cx="500" cy="20" r="1.5" fill="#ffffff" opacity="0.7"/>
<circle cx="700" cy="40" r="1" fill="#ffffff" opacity="0.3"/>
<circle cx="900" cy="70" r="2" fill="#ffffff" opacity="0.5"/>
<circle cx="1100" cy="30" r="1" fill="#ffffff" opacity="0.6"/>
<circle cx="1150" cy="100" r="1.5" fill="#ffffff" opacity="0.4"/>
<circle cx="50" cy="200" r="1" fill="#ffffff" opacity="0.3"/>
<circle cx="1180" cy="250" r="1.5" fill="#ffffff" opacity="0.5"/>
<circle cx="100" cy="350" r="1" fill="#ffffff" opacity="0.4"/>
<circle cx="400" cy="400" r="2" fill="#ffffff" opacity="0.3"/>
<circle cx="800" cy="380" r="1" fill="#ffffff" opacity="0.5"/>
<circle cx="1050" cy="420" r="1.5" fill="#ffffff" opacity="0.4"/>

<!-- Tech grid lines in background - top area -->
<g opacity="0.08" stroke="#4af" stroke-width="1">
  <line x1="0" y1="100" x2="400" y2="100"/>
  <line x1="0" y1="150" x2="350" y2="150"/>
  <line x1="50" y1="0" x2="50" y2="200"/>
  <line x1="100" y1="0" x2="100" y2="180"/>
  <line x1="150" y1="0" x2="150" y2="160"/>
  <line x1="200" y1="0" x2="200" y2="140"/>
  <line x1="250" y1="0" x2="250" y2="120"/>
  <line x1="300" y1="0" x2="300" y2="110"/>
</g>

<!-- Right side tech elements -->
<g opacity="0.1" stroke="#4af" stroke-width="1">
  <line x1="800" y1="50" x2="1200" y2="50"/>
  <line x1="850" y1="120" x2="1200" y2="120"/>
  <line x1="900" y1="0" x2="900" y2="200"/>
  <line x1="950" y1="0" x2="950" y2="180"/>
  <line x1="1000" y1="0" x2="1000" y2="160"/>
  <line x1="1050" y1="0" x2="1050" y2="200"/>
  <line x1="1100" y1="0" x2="1100" y2="200"/>
</g>

<!-- Bottom data bar chart (right side) -->
<g opacity="0.3" fill="#00bfff">
  <rect x="980" y="300" width="20" height="80"/>
  <rect x="1010" y="260" width="20" height="120"/>
  <rect x="1040" y="320" width="20" height="60"/>
  <rect x="1070" y="240" width="20" height="140"/>
  <rect x="1100" y="280" width="20" height="100"/>
  <rect x="1130" y="310" width="20" height="70"/>
</g>

<!-- Bar chart labels -->
<g opacity="0.15" fill="none" stroke="#00bfff" stroke-width="1">
  <line x1="970" y1="380" x2="1170" y2="380"/>
  <line x1="970" y1="340" x2="1170" y2="340"/>
  <line x1="970" y1="300" x2="1170" y2="300"/>
  <line x1="970" y1="260" x2="1170" y2="260"/>
</g>

<!-- Main earth/globe -->
<g transform="translate(480, 225)">
  <!-- Glow ring around globe -->
  <circle r="200" fill="url(#glowGrad)" opacity="0.4"/>
  
  <!-- Globe body -->
  <circle r="170" fill="url(#globeGrad)" filter="url(#softglow)"/>
  
  <!-- Atmosphere glow -->
  <circle r="175" fill="none" stroke="#4af6ff" stroke-width="3" opacity="0.3"/>
  <circle r="180" fill="none" stroke="#4af6ff" stroke-width="1" opacity="0.1"/>
  
  <!-- Latitude lines -->
  <g fill="none" stroke="#2a7fbf" stroke-width="1.2" opacity="0.6">
    <line x1="-170" y1="0" x2="170" y2="0"/>
    <ellipse rx="155" ry="55"/>
    <ellipse rx="110" ry="100"/>
    <ellipse rx="55" ry="145"/>
    <ellipse rx="130" ry="32"/>
    <ellipse rx="130" ry="32" transform="translate(0,-100)"/>
    <ellipse rx="130" ry="32" transform="translate(0,100)"/>
  </g>
  
  <!-- Meridian lines -->
  <g fill="none" stroke="#2a7fbf" stroke-width="1" opacity="0.5">
    <ellipse rx="170" ry="170" transform="rotate(0)"/>
    <ellipse rx="170" ry="170" transform="rotate(30)"/>
    <ellipse rx="170" ry="170" transform="rotate(60)"/>
    <ellipse rx="170" ry="170" transform="rotate(90)"/>
    <ellipse rx="170" ry="170" transform="rotate(120)"/>
    <ellipse rx="170" ry="170" transform="rotate(150)"/>
  </g>
  
  <!-- Continents (simplified) -->
  <!-- Asia/Eurasia rough shape -->
  <path fill="#1a5c9e" opacity="0.8" d="M30,-100 Q80,-120 130,-80 Q150,-40 140,20 Q120,60 80,70 Q40,80 10,60 Q-30,40 -20,0 Q-10,-40 30,-100Z"/>
  <!-- Africa rough -->
  <path fill="#1a5c9e" opacity="0.8" d="M0,30 Q30,20 40,60 Q50,100 30,130 Q10,150 -20,140 Q-50,120 -50,80 Q-40,40 0,30Z"/>
  <!-- Europe -->
  <path fill="#1a5c9e" opacity="0.7" d="M-20,-90 Q20,-110 40,-80 Q30,-50 0,-40 Q-30,-50 -20,-90Z"/>
  <!-- Americas (partially visible on left side) -->
  <path fill="#1a5c9e" opacity="0.6" d="M-130,-60 Q-110,-80 -90,-50 Q-80,-20 -100,20 Q-120,50 -140,30 Q-160,0 -130,-60Z"/>
  
  <!-- Data connection dots on globe -->
  <g fill="#00e5ff" filter="url(#glow)">
    <circle cx="80" cy="-50" r="5" opacity="0.9"/>
    <circle cx="-30" cy="80" r="4" opacity="0.8"/>
    <circle cx="120" cy="40" r="3" opacity="0.7"/>
    <circle cx="-80" cy="-30" r="4" opacity="0.8"/>
    <circle cx="20" cy="120" r="3" opacity="0.7"/>
  </g>
  
  <!-- Connection lines from dots -->
  <g stroke="#00e5ff" stroke-width="1.5" opacity="0.4" fill="none">
    <line x1="80" y1="-50" x2="-30" y2="80"/>
    <line x1="80" y1="-50" x2="120" y2="40"/>
    <line x1="-30" y1="80" x2="20" y2="120"/>
    <line x1="120" y1="40" x2="-80" y2="-30"/>
  </g>
</g>

<!-- Small data/tech icons top left - bar charts -->
<g transform="translate(80,80)" opacity="0.6">
  <rect x="0" y="20" width="10" height="30" fill="#4af"/>
  <rect x="15" y="5" width="10" height="45" fill="#4af"/>
  <rect x="30" y="15" width="10" height="35" fill="#4af"/>
  <rect x="45" y="0" width="10" height="50" fill="#4af"/>
</g>

<!-- Pie chart top left -->
<g transform="translate(220, 100)" opacity="0.5">
  <path d="M0,0 L0,-50 A50,50 0 0,1 43,25 Z" fill="#4af" opacity="0.8"/>
  <path d="M0,0 L43,25 A50,50 0 0,1 -43,25 Z" fill="#0af" opacity="0.7"/>
  <path d="M0,0 L-43,25 A50,50 0 0,1 0,-50 Z" fill="#2af" opacity="0.6"/>
</g>

<!-- World map grid (top-left area) -->
<g transform="translate(30,160)" opacity="0.15" stroke="#4af" fill="none" stroke-width="0.8">
  <rect x="0" y="0" width="60" height="40"/>
  <rect x="65" y="0" width="60" height="40"/>
  <rect x="0" y="45" width="60" height="40"/>
  <rect x="65" y="45" width="60" height="40"/>
  <rect x="0" y="90" width="60" height="40"/>
  <rect x="65" y="90" width="60" height="40"/>
</g>

<!-- VietNam text / Logo area top left -->
<g transform="translate(20,20)">
  <!-- BHXH Logo circle -->
  <circle cx="30" cy="30" r="28" fill="#17335C" stroke="#fff" stroke-width="2"/>
  <text x="30" y="25" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">BẢO HIỂM</text>
  <text x="30" y="35" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">XÃ HỘI</text>
  <text x="30" y="45" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFD700">VIỆT NAM</text>
</g>

<!-- Title text -->
<text x="100" y="45" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff" opacity="0.9">Cổng Thông Tin Điện Tử</text>
<text x="100" y="68" font-family="Arial" font-size="13" fill="#aaccff" opacity="0.8">Bảo Hiểm Xã Hội Việt Nam</text>

<!-- Bottom left info boxes -->
<g transform="translate(30, 290)">
  <rect x="0" y="0" width="120" height="60" rx="5" fill="#1a4a8a" opacity="0.7"/>
  <text x="10" y="20" font-family="Arial" font-size="10" fill="#adf">Hồ sơ tiếp nhận</text>
  <text x="10" y="38" font-family="Arial" font-size="18" font-weight="bold" fill="#fff">5.1M</text>
  <text x="10" y="52" font-family="Arial" font-size="9" fill="#7af">+12% so với 2024</text>
</g>

<g transform="translate(165, 290)">
  <rect x="0" y="0" width="120" height="60" rx="5" fill="#1a4a8a" opacity="0.7"/>
  <text x="10" y="20" font-family="Arial" font-size="10" fill="#adf">Đã giải quyết</text>
  <text x="10" y="38" font-family="Arial" font-size="18" font-weight="bold" fill="#fff">4.8M</text>
  <text x="10" y="52" font-family="Arial" font-size="9" fill="#7af">94.48% trong hạn</text>
</g>

<!-- Right side connection arc lines -->
<g fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.2">
  <path d="M750,100 Q900,0 1100,100"/>
  <path d="M800,200 Q950,80 1150,180"/>
  <path d="M850,300 Q1000,180 1180,280"/>
</g>

</svg>
