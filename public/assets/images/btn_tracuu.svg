<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60">
    <defs>
        <style>
            .icon { fill: #8dc63f; }
            .icon-stroke { stroke: #8dc63f; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
            .title-bold { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 800; font-size: 19px; }
            .title-light { fill: #85b8eb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 400; font-size: 17px; }
        </style>
    </defs>
    <g transform="translate(15, 10)">
        <rect class="icon-stroke" stroke-width="3" x="2" y="6" width="36" height="24" rx="2"/>
        <line class="icon-stroke" stroke-width="3" x1="12" y1="36" x2="28" y2="36"/>
        <line class="icon-stroke" stroke-width="3" x1="20" y1="30" x2="20" y2="36"/>
        <circle class="icon" cx="30" cy="30" r="12" />
        <circle fill="none" stroke="#0f2a4a" stroke-width="2" cx="28" cy="28" r="4"/>
        <line stroke="#0f2a4a" stroke-width="2" x1="31" y1="31" x2="35" y2="35"/>
    </g>
    <text x="75" y="28" class="title-bold">TRA CỨU</text>
    <text x="75" y="50" class="title-light">HỒ SƠ</text>
</svg>