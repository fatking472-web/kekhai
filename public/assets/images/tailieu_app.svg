<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 153.12 120">
<defs>
<style>
.cls-bg { fill: #17335C; }
.cls-text-bold { fill: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; font-weight: 900; font-size: 20px; }
.cls-text-light { fill: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; font-weight: 300; font-size: 18px; }
</style>
</defs>
<rect class="cls-bg" width="153.12" height="120" rx="6"/>
<!-- Video play icon in orange #FF8A65 -->
<g transform="translate(8, 14)">
  <!-- Screen rectangle -->
  <rect fill="none" stroke="#FF8A65" stroke-width="2.5" x="1" y="2" width="36" height="24" rx="3"/>
  <!-- Play triangle -->
  <polygon fill="#FF8A65" points="14,9 14,19 26,14"/>
  <!-- Small dots below (app icons) -->
  <rect fill="#FF8A65" x="1" y="30" width="9" height="9" rx="2"/>
  <rect fill="#FF8A65" x="14" y="30" width="9" height="9" rx="2"/>
  <rect fill="#FF8A65" x="27" y="30" width="9" height="9" rx="2"/>
</g>
<text x="55" y="38" class="cls-text-bold">TÀI LIỆU &amp;</text>
<text x="55" y="62" class="cls-text-light">ỨNG DỤNG</text>
</svg>
